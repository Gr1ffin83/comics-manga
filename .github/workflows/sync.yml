name: Sync Safe Extensions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download extension list
        run: curl -L https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json -o index.min.json

      - name: Filter adult extensions
        run: |
          python <<EOF
                    import json

          with open("index.min.json", "r", encoding="utf-8") as f:
              data = json.load(f)

                    allowlist = [
              "manganato",
              "allmanga",
              "mangafire",
              "asura",
              "weeb central",
              "mangaread",
              "real life comics",
              "tappytoon",
          ]

          filtered = []
          for ext in data:
              text = ext.get("name", "").lower()
              for source in ext.get("sources", []):
                  text += " " + source.get("name", "").lower()

              if ext.get("nsfw", 0) == 0 or any(word in text for word in allowlist):
                  filtered.append(ext)

          with open("index.min.json", "w", encoding="utf-8") as f:
              json.dump(filtered, f, separators=(",", ":"))
      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.min.json
          git commit -m "Update filtered extensions" || exit 0
          git push