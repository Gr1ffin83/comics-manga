name: Sync Safe Extensions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build filtered repo
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          INDEX_URL = "https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"
          APK_BASE = "https://raw.githubusercontent.com/keiyoushi/extensions/repo/"

          allowlist = [
              "manganato",
              "allmanga",
              "mangafire",
              "asura",
              "weeb central",
              "mangaread",
              "real life comics",
              "tappytoon",
          ]

          with urllib.request.urlopen(INDEX_URL) as r:
              data = json.load(r)

          for file in os.listdir("."):
              if file.endswith(".apk"):
                  os.remove(file)

          filtered = []
          for ext in data:
              text = ext.get("name", "").lower()
              for source in ext.get("sources", []):
                  text += " " + source.get("name", "").lower()

              keep = ext.get("nsfw", 0) == 0 or any(word in text for word in allowlist)
              if not keep:
                  continue

              apk = ext.get("apk")
              if not apk:
                  continue

              try:
                  urllib.request.urlretrieve(APK_BASE + apk, apk)
                  filtered.append(ext)
                  print("Downloaded", apk)
              except Exception as e:
                  print("Skipped", apk, e)

          with open("index.min.json", "w", encoding="utf-8") as f:
              json.dump(filtered, f, separators=(",", ":"))

          print("Kept", len(filtered), "extensions")
          PY

        - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add index.min.json
          git add *.apk || true
          git commit -m "Update filtered extensions and APKs" || exit 0
          git push